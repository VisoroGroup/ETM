name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build Client
        working-directory: client
        run: |
          npm install
          npm run build

      - name: Install & Build Server
        working-directory: server
        run: |
          npm install
          npx tsc --noEmit

      - name: Run Server Tests
        working-directory: server
        run: npm test
